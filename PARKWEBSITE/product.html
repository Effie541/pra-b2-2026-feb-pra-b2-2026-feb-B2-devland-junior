<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeveloperLand - Het meest leerzame prepark voor het hele gezin!</title>

  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="wrapper">
        <img src="images/logo-big-v3.png" alt="Het logo van DeveloperLand met een draaimolen, kasteel, achtbaan en tot slot een gezin op de voorgrond." class="logo hidden-on-sm">
        <h1 class="hidden-on-lg">DeveloperLand</h1>
      </div>
    </div>
  </header>
  <main>
      <div class="wrapper">

    <section class="product-detail">
      
      <h2>DeveloperLand Mok</h2>

      <div class="product-container">
        
        <div class="product-image">
          <img src="images/merchandise/mok.JPG" alt="DeveloperLand Mok">
        </div>

        <div class="product-info">
          <p><strong>Prijs: € 14,95</strong></p>

          <p>
            In het kort: Een mok met jouw eigen achtbaan erop!
            Op zoek naar een uniek souvenir? Dan is deze DeveloperLand mok perfect
            voor jou. De opdruk is van hoge kwaliteit en blijft lang mooi.
          </p>

          <button class="btn-order">
            Plaats in winkelmand (€ 14,95)
          </button>

        </div>

      </div>

    </section>

  </div>
  </main>
  <footer>
    <div class="wrapper">
      <div class="copyright">
        &copy; 2020 - 2021  DeveloperLand&nbsp;&nbsp;All Rights Reserved
      </div>
    </div>
  </footer>
</body>
</html>
